<!DOCTYPE html>
​<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Voice Reader - GitHub Edition</title>
<script src="https://www.google.com/search?q=https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="[liên kết đáng ngờ đã bị xóa]">
<style>
@import url('https://www.google.com/search?q=https://fonts.googleapis.com/css2%3Ffamily%3DBe%2BVietnam%2BPro:wght%40300%3B400%3B500%3B700%26display%3Dswap');
body { font-family: 'Be Vietnam Pro', sans-serif; background-color: #0f172a; color: #f1f5f9; }
.glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); }
.voice-card { transition: all 0.2s ease; border: 1px solid rgba(51, 65, 85, 0.5); }
.voice-active { border-color: #3b82f6 !important; background: rgba(59, 130, 246, 0.1) !important; }
.custom-scrollbar::-webkit-scrollbar { width: 5px; }
.custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
</style>
</head>
<body class="p-4 md:p-8 min-h-screen">
<div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
<div class="lg:col-span-8 space-y-6">
<header class="flex items-center gap-3 mb-4">
<div class="p-3 bg-blue-600 rounded-xl shadow-lg"><i class="fas fa-volume-high text-white"></i></div>
<h1 class="text-xl font-bold">AI Reader <span class="text-blue-500 font-normal text-sm">GitHub Pages</span></h1>
</header>
<div class="glass-panel p-6 rounded-3xl">
<textarea id="textInput" class="w-full h-80 bg-slate-900/40 border border-slate-700 rounded-2xl p-6 text-slate-200 custom-scrollbar resize-none outline-none focus:ring-1 focus:ring-blue-500" placeholder="Nhập văn bản...">Chào mừng bạn đến với ứng dụng đọc văn bản chạy trên GitHub Pages!</textarea>
<div class="grid grid-cols-2 gap-4 mt-6 pt-6 border-t border-slate-800">
<div class="space-y-2">
<label class="text-[10px] font-bold text-slate-500 uppercase">Tốc độ: <span id="rV">1</span>x</label>
<input type="range" id="rate" min="0.5" max="2" step="0.1" value="1" class="w-full accent-blue-500" oninput="document.getElementById('rV').innerText=this.value">
</div>
<div class="space-y-2">
<label class="text-[10px] font-bold text-slate-500 uppercase">Cao độ: <span id="pV">1</span></label>
<input type="range" id="pitch" min="0.5" max="1.5" step="0.1" value="1" class="w-full accent-purple-500" oninput="document.getElementById('pV').innerText=this.value">
</div>
</div>
</div>
<div class="flex justify-center gap-4">
<button onclick="window.speechSynthesis.cancel();" class="w-14 h-14 bg-slate-800 rounded-2xl border border-slate-700 hover:text-red-500 transition-colors"><i class="fas fa-stop"></i></button>
<button onclick="speak()" class="px-12 h-14 bg-blue-600 rounded-2xl text-white font-bold shadow-lg hover:bg-blue-500 transition-all flex items-center gap-3"><i class="fas fa-play"></i> Phát giọng đọc</button>
<button onclick="window.speechSynthesis.pause();" class="w-14 h-14 bg-slate-800 rounded-2xl border border-slate-700"><i class="fas fa-pause"></i></button>
</div>
</div>
<div class="lg:col-span-4 glass-panel p-5 rounded-3xl h-[600px] flex flex-col">
<h3 class="text-xs font-bold text-slate-400 uppercase mb-4">Giọng đọc sẵn có</h3>
<div id="vList" class="flex-1 overflow-y-auto custom-scrollbar space-y-2"></div>
</div>
</div>
<script>
const synth = window.speechSynthesis;
let voices = [];
let selectedIdx = 0;
function loadVoices() {
voices = synth.getVoices().sort((a,b) => a.lang.includes('vi') ? -1 : 1);
document.getElementById('vList').innerHTML = voices.map((v, i) =>  &lt;div onclick=&quot;selectedIdx=${i};loadVoices()&quot; class=&quot;p-3 rounded-xl border border-slate-800 cursor-pointer ${i===selectedIdx?&#39;border-blue-500 bg-blue-500/10&#39;:&#39;&#39;}&quot;&gt; &lt;div class=&quot;text-[11px] font-bold text-slate-200 truncate&quot;&gt;${v.name}&lt;/div&gt; &lt;div class=&quot;text-[9px] text-slate-500 uppercase&quot;&gt;${v.lang}&lt;/div&gt; &lt;/div&gt;).join('');
}
function speak() {
synth.cancel();
setTimeout(() => {
const u = new SpeechSynthesisUtterance(document.getElementById('textInput').value);
u.voice = voices[selectedIdx];
u.rate = document.getElementById('rate').value;
u.pitch = document.getElementById('pitch').value;
synth.speak(u);
}, 50);
}
if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoices;
window.onload = loadVoices;
</script>
</body>
</html>
