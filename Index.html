<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acapella Studio AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #050507; color: white; display: flex; align-items: center; justify-content: center; min-height: screen; margin: 0; }
        .glass { background: rgba(20, 20, 25, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 3rem; width: 100%; max-width: 400px; padding: 2rem; }
        .spinning { animation: spin 20s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4">
    <div class="glass shadow-2xl text-center">
        <h1 class="text-rose-500 font-black tracking-[0.3em] text-[10px] uppercase mb-8">Acapella AI Studio</h1>
        
        <div class="relative mb-8 flex justify-center">
            <div class="w-40 h-40 rounded-full border-8 border-neutral-900 overflow-hidden shadow-2xl">
                <img id="disc" src="https://images.unsplash.com/photo-1514119412350-e174d90d280e?w=400" class="w-full h-full object-cover">
            </div>
        </div>

        <div class="flex gap-2 mb-6 bg-black/40 p-1 rounded-xl">
            <button onclick="setStyle('ballad')" id="b-ballad" class="flex-1 py-2 rounded-lg text-[10px] font-bold bg-rose-500">BALLAD</button>
            <button onclick="setStyle('bolero')" id="b-bolero" class="flex-1 py-2 rounded-lg text-[10px] font-bold text-neutral-500">BOLERO</button>
        </div>

        <textarea id="lyric" class="w-full h-24 bg-black/20 border border-white/5 rounded-2xl p-4 text-sm outline-none mb-4 resize-none" placeholder="Nhập lời bài hát...">Gió cuốn hoa trôi về đâu...</textarea>
        
        <div class="flex justify-center mb-8">
            <button id="main-btn" class="w-20 h-20 bg-white rounded-full flex items-center justify-center hover:scale-105 active:scale-95 transition-all">
                <i data-lucide="play" id="i-play" class="text-black fill-current"></i>
                <i data-lucide="loader-2" id="i-load" class="text-rose-500 animate-spin hidden"></i>
            </button>
        </div>

        <div class="bg-white/5 p-3 rounded-2xl flex items-center gap-3">
            <i data-lucide="volume-2" class="w-4 h-4 text-neutral-500"></i>
            <input type="range" id="vol" class="w-full accent-rose-500" value="80">
        </div>
        <p id="msg" class="mt-4 text-[9px] text-neutral-600 font-bold uppercase">Sẵn sàng</p>
    </div>

    <script>
        // --- DÁN API KEY CỦA BẠN VÀO ĐÂY ---
        const API_KEY = ""; 
        
        let state = { style: 'ballad', playing: false, loading: false, vocal: null };
        lucide.createIcons();

        function setStyle(s) {
            state.style = s;
            document.getElementById('b-ballad').className = s === 'ballad' ? "flex-1 py-2 rounded-lg text-[10px] font-bold bg-rose-500" : "flex-1 py-2 rounded-lg text-[10px] font-bold text-neutral-500";
            document.getElementById('b-bolero').className = s === 'bolero' ? "flex-1 py-2 rounded-lg text-[10px] font-bold bg-rose-500" : "flex-1 py-2 rounded-lg text-[10px] font-bold text-neutral-500";
        }

        async function startAI() {
            const txt = document.getElementById('lyric').value;
            if(!txt || state.loading || !API_KEY) return alert("Vui lòng nhập lời và dán API KEY vào mã nguồn!");

            state.loading = true;
            document.getElementById('i-play').classList.add('hidden');
            document.getElementById('i-load').classList.remove('hidden');
            document.getElementById('msg').innerText = "AI đang xử lý...";

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Hát chay phong cách ${state.style}: ${txt}` }] }],
                        generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" }}}}
                    })
                });
                const data = await res.json();
                const b64 = data.candidates[0].content.parts[0].inlineData.data;
                const blob = new Blob([Uint8Array.from(atob(b64), c => c.charCodeAt(0))], {type: 'audio/mp3'});
                
                if(state.vocal) state.vocal.pause();
                state.vocal = new Audio(URL.createObjectURL(blob));
                state.vocal.play();
                updateUI(true);
            } catch (e) {
                document.getElementById('msg').innerText = "LỖI KẾT NỐI!";
            } finally {
                state.loading = false;
                document.getElementById('i-load').classList.add('hidden');
                document.getElementById('i-play').classList.remove('hidden');
            }
        }

        function updateUI(p) {
            state.playing = p;
            document.getElementById('disc').className = p ? "w-full h-full object-cover spinning" : "w-full h-full object-cover";
            document.getElementById('i-play').setAttribute('data-lucide', p ? 'pause' : 'play');
            document.getElementById('msg').innerText = p ? "Đang trình diễn" : "Sẵn sàng";
            lucide.createIcons();
        }

        document.getElementById('main-btn').onclick = () => {
            if(!state.vocal) startAI();
            else state.playing ? (state.vocal.pause(), updateUI(false)) : (state.vocal.play(), updateUI(true));
        };
    </script>
</body>
</html>
